services:
  db:
    image: postgres:16-alpine
    container_name: winb-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-winb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-winb}
      POSTGRES_DB: ${POSTGRES_DB:-winb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-winb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: winb-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-winb}:${POSTGRES_PASSWORD:-winb}@db:5432/${POSTGRES_DB:-winb}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      SCRAPER_USER_AGENT: ${SCRAPER_USER_AGENT:-WinB-ResearchBot/0.1}
      SCRAPER_MIN_INTERVAL_SEC: ${SCRAPER_MIN_INTERVAL_SEC:-10}
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./notebooks:/app/notebooks
      - ./tests:/app/tests
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      # config files: mount read-only so tool settings (pytest markers, ruff
      # rules) reflect host edits without rebuilding the image.
      - ./pyproject.toml:/app/pyproject.toml:ro
    tty: true
    stdin_open: true
    command: tail -f /dev/null

volumes:
  postgres_data:
    name: winb_postgres_data
